<!doctype html>
<html lang="lt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Krepšelis</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="header">
      <a href="products.html" class="logo"
        ><img src="images/logo.jpg" alt="Logo"
      /></a>
      <h1>Prieskonių pasaulis</h1>
      <nav class="nav"><a href="products.html">Produktai</a></nav>
    </header>

    <main>
      <section class="cart">
        <h2>Krepšelis</h2>

        <div class="cart_item">
          <a href="product.html#bazilikas">
            <img src="images/bazilikas.jpg" alt="Bazilikas" class="cart_img" />
          </a>

          <span>Bazilikas</span>
          <span>Kiekis: 2</span>
          <span>3.58 €</span>
        </div>

        <div class="cart_item">
          <a href="product.html#pipirai">
            <img src="images/malti_juodieji_pipirai.jpg" alt="Pipirai" class="cart_img" />
          </a>

          <span>Pipirai</span>
          <span>Kiekis: 1</span>
          <span>1.99 €</span>
        </div>

        <div class="cart_total">
          <strong>Viso: 5.57 €</strong>
          <button class="btn">Apmokėti</button>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer_content">
        <p>&copy; 2026 Prieskonių pasaulis</p>
        <p>Kontaktai: info@prieskoniai.lt</p>

        <div class="socials">
          <a href="#">🌐</a>
          <a href="#">📘</a>
          <a href="#">📸</a>
          <a href="#">🐦</a>
        </div>
      </div>
    </footer>
  </body>
</html>
